name: Deploy – Staging

on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  deploy-backend-staging:
    name: Backend Staging Deploy (Render)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render backend servisini tetikle
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_BACKEND_DEPLOY_HOOK }}
        run: |
          echo "Render backend staging deploy tetikleniyor..."
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" | jq .

  deploy-frontend-staging:
    name: Frontend Staging Deploy (Render)
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-backend-staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render frontend servisini tetikle
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_FRONTEND_DEPLOY_HOOK }}
        run: |
          echo "Render frontend staging deploy tetikleniyor..."
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" | jq .

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging, deploy-frontend-staging]
    environment: staging

    steps:
      - name: API sağlık kontrolü
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "Staging API sağlık kontrolü yapılıyor: $STAGING_API_URL"
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/health")
            if [ "$status" = "200" ]; then
              echo "API hazır (HTTP $status)"
              exit 0
            fi
            echo "Deneme $i/10 – HTTP $status, 10 saniye bekleniyor..."
            sleep 10
          done
          echo "Staging API sağlık kontrolü başarısız oldu!"
          exit 1
