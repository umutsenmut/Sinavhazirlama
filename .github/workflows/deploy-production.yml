name: Deploy – Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Onay bekle ──────────────────────────────────────────────────────────────
  await-approval:
    name: Manuel Onay Bekle
    runs-on: ubuntu-latest
    environment: production   # GitHub environment protection rules burada devreye girer

    steps:
      - name: Üretim deploy onayı
        run: echo "Üretim deploy onaylandı, devam ediliyor..."

  # ── Backend deploy ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend Production Deploy (Render)
    runs-on: ubuntu-latest
    needs: await-approval
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render backend servisini tetikle
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PROD_BACKEND_DEPLOY_HOOK }}
        run: |
          echo "Render backend production deploy tetikleniyor..."
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" | jq .

  # ── Frontend deploy ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend Production Deploy (Render)
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render frontend servisini tetikle
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PROD_FRONTEND_DEPLOY_HOOK }}
        run: |
          echo "Render frontend production deploy tetikleniyor..."
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" | jq .

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    environment: production

    steps:
      - name: API sağlık kontrolü
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
        run: |
          echo "Üretim API sağlık kontrolü yapılıyor: $PROD_API_URL"
          for i in {1..12}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_API_URL/health")
            if [ "$status" = "200" ]; then
              echo "API hazır (HTTP $status)"
              exit 0
            fi
            echo "Deneme $i/12 – HTTP $status, 15 saniye bekleniyor..."
            sleep 15
          done
          echo "Üretim API sağlık kontrolü başarısız oldu!"
          exit 1

      - name: Deploy başarı bildirimi
        if: success()
        run: echo "Üretim deploy başarıyla tamamlandı!"
