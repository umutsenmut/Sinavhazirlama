name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend – pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sinavhazirlama_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Testleri çalıştır
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/sinavhazirlama_test
          SECRET_KEY: test-secret-key-for-ci-only-minimum-32-chars
          GEMINI_API_KEY: fake-key-for-testing
          DEBUG: "true"
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  frontend-tests:
    name: Frontend – build check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: TypeScript derleme
        run: npx tsc --noEmit
